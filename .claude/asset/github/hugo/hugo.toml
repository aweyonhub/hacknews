baseURL = 'https://<your-username>.github.io/hacknews/'
languageCode = 'zh-cn'
title = 'HackNews Digest'
theme = ['PaperMod']

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
pagerSize = 10

[minify]
disableSVG = true

[params]
env = "production"
title = "HackNews Digest"
description = "Hacker News 热点新闻深度归档 — 每日 Top 10 采集 + 精选文章深度解读 + 周度趋势分析"
keywords = ["Hacker News", "技术", "AI", "开源", "深度解读"]
author = "HackNews Digest"
images = ["/images/og.png"]
DateFormat = "2006-01-02"
defaultTheme = "auto"
disableThemeToggle = false
ShowReadingTime = true
ShowShareButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = false
ShowRssButtonInSectionTermList = true
UseHugoToc = true
disableSpecial1stPost = false
disableScrollToTop = false
comments = false
hidemeta = false
hideSummary = false
showtoc = true
tocopen = false

[params.assets]
favicon = "/images/favicon.ico"
favicon16x16 = "/images/favicon-16x16.png"
favicon32x32 = "/images/favicon-32x32.png"
apple_touch_icon = "/images/apple-touch-icon.png"
safari_pinned_tab = "/images/safari-pinned-tab.svg"

[params.label]
text = "Home"
icon = "/images/apple-touch-icon.png"
iconHeight = 35

[params.profileMode]
enabled = false

[params.homeInfoParams]
Title = "HackNews Digest 🔥"
Content = """
> Hacker News 热点新闻 **每日 Top 10 采集** + **精选深度解读** + **周度趋势分析**

从 HN 海量信息中筛选最有价值的技术话题，用中文为你呈现核心洞察。
"""

[[params.socialIcons]]
name = "github"
url = "https://github.com/<your-username>/hacknews"

[params.cover]
hidden = true
hiddenInList = true
hiddenInSingle = true

[params.fuseOpts]
isCaseSensitive = false
minMatchCharLength = 2
limit = 20
keys = ["title", "permalink", "summary", "content"]

[params.editPost]
URL = ""
Text = ""
appendFilePath = true

[[menu.main]]
identifier = "archives"
name = "📅 周度索引"
url = "/archives/"
weight = 1

[[menu.main]]
identifier = "search"
name = "🔍 搜索"
url = "/search/"
weight = 2

[[menu.main]]
identifier = "tags"
name = "🏷️ 标签"
url = "/tags/"
weight = 3

[taxonomies]
category = "categories"
tag = "tags"
series = "series"

[outputs]
home = ["HTML", "RSS", "JSON"]

[markup.goldmark.renderer]
unsafe = true

[markup.tableOfContents]
endLevel = 4
ordered = false
startLevel = 2

[services.rss]
limit = 20
