name: 部署 Hugo 站点到 GitHub Pages

on:
  push:
    branches:
      - main  # 你的主分支名
    paths:
      - '202*/*.md'  # 监控新闻文件变动（根目录下的月度目录）
      - 'hugo/**'            # 监控 Hugo 配置变动
  workflow_dispatch:         # 支持手动触发

# 设置 GITHUB_TOKEN 的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 允许一个并发部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 构建 Hugo 站点
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true  # 需要 extended 版本处理 SCSS

      - name: 拉取 PaperMod 主题
        run: |
          rm -rf ./hugo/themes/PaperMod
          git clone https://github.com/adityatelange/hugo-PaperMod.git ./hugo/themes/PaperMod --depth 1

      - name: 设置 Pages
        uses: actions/configure-pages@v5

      - name: 同步 Markdown 文章到 Hugo 内容目录
        run: |
          # 先创建必要目录
          mkdir -p ./hugo/content/posts
          mkdir -p ./hugo/content/weeks
          
          # 复制所有月度目录下的 md 文件到 hugo/content/posts/
          find ./ -path "./202*" -name "*.md" -not -name "week*.md" | while read file; do
            filename=$(basename "$file")
            # 解析文件名：YYYYMMdd-中文标题-EnglishTitle.md
            date_part=${filename:0:8}
            year=${date_part:0:4}
            month=${date_part:4:2}
            day=${date_part:6:2}
            # 提取标题（去掉日期和后缀）
            title=${filename:9:-3}
            title=${title//-/ }
            
            # 读取文件内容，删除所有旧的front matter（如果有）
            content=$(sed '1,/^---$/d' "$file" | sed '1,/^---$/d' || cat "$file")
            
            # 添加统一的front matter
            cat > ./hugo/content/posts/"$filename" << 'EOF'
---
title: "REPLACE_TITLE"
date: REPLACE_DATE
---
REPLACE_CONTENT
EOF
            
            # 替换内容
            sed -i "s/REPLACE_TITLE/${title//\//\\/}/g" ./hugo/content/posts/"$filename"
            sed -i "s/REPLACE_DATE/$year-$month-$day/g" ./hugo/content/posts/"$filename"
            # 替换内容，转义特殊字符
            escaped_content=$(echo "$content" | sed 's/[\/&]/\\&/g')
            sed -i "s/REPLACE_CONTENT/$escaped_content/g" ./hugo/content/posts/"$filename"
          done
          
          # 复制 week*.md 到 hugo/content/weeks/
          find ./ -path "./202*" -name "week*.md" | while read file; do
            filename=$(basename "$file")
            # 提取周数和年月
            week_num=$(echo "$filename" | grep -o "[0-9]\+" | head -1)
            year=${filename:0:4}
            month=${filename:4:2}
            
            # 读取内容
            content=$(cat "$file")
            
            # 添加统一的front matter
            cat > ./hugo/content/weeks/"$filename" << 'EOF'
---
title: "REPLACE_TITLE"
date: REPLACE_DATE
---
REPLACE_CONTENT
EOF
            
            # 替换内容
            sed -i "s/REPLACE_TITLE/${year}年${month}月 第${week_num}周热点/g" ./hugo/content/weeks/"$filename"
            sed -i "s/REPLACE_DATE/$year-$month-01/g" ./hugo/content/weeks/"$filename"
            escaped_content=$(echo "$content" | sed 's/[\/&]/\\&/g')
            sed -i "s/REPLACE_CONTENT/$escaped_content/g" ./hugo/content/weeks/"$filename"
          done

      - name: 构建 Hugo 站点
        run: |
          cd ./hugo
          hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./hugo/public

  # 部署到 GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
