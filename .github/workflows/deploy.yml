name: Deploy Hugo Site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - '2026*/*.md'
      - 'README.md'
      - '.github/hugo/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Sync content to Hugo directory
        run: |
          # Copy all markdown content
          cp -r 2026* .github/hugo/content/
          cp README.md .github/hugo/content/_index.md
          
          # Add front matter to index
          sed -i '1s/^/---\ntitle: HackNews Digest\n---\n\n/' .github/hugo/content/_index.md
          

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Hugo
        working-directory: .github/hugo
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .github/hugo/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
