# Hugo 站点配置 — HackNews Digest
# 文档：https://gohugo.io/getting-started/configuration/

baseURL = "https://aweyonhub.github.io/"
languageCode = "zh-CN"
defaultContentLanguage = "zh"
title = "HackNews Digest"

# 从文件名中提取日期（格式：YYYYMMDD-xxx.md）
[frontmatter]
  date     = [":filename", ":fileModTime"]
  lastmod  = [":fileModTime"]

# Markdown 渲染设置
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true          # 允许 Markdown 中的原始 HTML
    [markup.goldmark.parser]
      autoHeadingID = true
  [markup.highlight]
    style          = "github"        # 使用类名模式，便于 CSS 切换主题
    lineNos        = false
    guessSyntax    = true
    noClasses      = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 4
    ordered    = false

# 站点参数
[params]
  description = "Hacker News 热点新闻深度归档 — 每日 Top 10 采集 + 精选深度解读 + 周度趋势分析"
  github      = "https://github.com/aweyonhub/hacknews"
  # 上方 github 地址请替换为实际的仓库地址

# 统一 URL 为小写，避免 GitHub Pages 大小写敏感问题
disablePathToLower = false

# 输出格式（home 额外输出 JSON 用于搜索索引）
[outputs]
  home    = ["HTML", "JSON"]
  page    = ["HTML"]
  section = ["HTML"]
