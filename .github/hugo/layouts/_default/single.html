{{- define "main" }}

{{- $hasTOC := gt (len .TableOfContents) 30 }}

<div class="article-page">
  <div class="article-layout{{ if $hasTOC }} has-toc{{ end }}">

    {{- if $hasTOC }}
    <aside class="toc-sidebar">
      <div class="toc-sticky">
        <div class="toc-header">目录导航</div>
        {{ .TableOfContents }}
      </div>
    </aside>
    {{- end }}

    <article class="article-main">
      <header class="article-header">
        {{- if not .Date.IsZero }}
        <time class="article-date">{{ .Date.Format "2006年01月02日" }}</time>
        {{- end }}
        <h1 class="article-title">{{ .Title }}</h1>
      </header>

      <div class="article-body">
        {{ .Content }}
      </div>

      <footer class="article-footer">
        <a class="back-link" href="{{ if .Parent }}{{ .Parent.RelPermalink }}{{ else }}{{ "/" | relURL }}{{ end }}">← 返回{{ if .Parent }}{{ .Parent.Title }}{{ else }}首页{{ end }}</a>
      </footer>
    </article>

  </div>
</div>

{{- end }}
