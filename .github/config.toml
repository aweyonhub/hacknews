baseURL = "https://aweyonhub.github.io/hacknews/"  # 修改为你的GitHub Pages地址
languageCode = "zh-CN"
title = "Hacker News 热点解读"
theme = "PaperMod"

[params]
  # 基本配置
  description = "Hacker News 热点新闻采集、深度解读、归档系统"
  keywords = ["Hacker News", "科技新闻", "深度解读", "技术洞察"]
  author = "Your Name"
  
  # 启用搜索功能
  enableSearch = true
  searchHidden = false
  
  # 主题模式
  defaultTheme = auto  # auto / light / dark
  disableThemeToggle = false
  
  # 代码高亮
  codeMaxLines = 100
  codeLineNumbers = true
  
  # 显示设置
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowWordCount = true
  ShowToc = true
  TocOpen = true
  
  # 社交链接
  [[params.socialIcons]]
    name = "GitHub"
    url = "https://aweyonhub.github.io/hacknews/"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "首页"
    url = "/"
    weight = 10
  
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 20
  
  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]  # JSON输出用于Fuse.js搜索功能

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # 允许HTML标签
