baseURL: "https://aweyonhub.github.io/hacknews/"
languageCode: "zh-CN"
defaultContentLanguage: "zh"
title: "Hacker News 中文精选"
theme: "PaperMod"

# 生成配置
enableEmoji: true
paginate: 10
pygmentsUseClasses: true
enableRobotsTXT: true

# 输出配置（搜索功能必需）
outputs:
  home:
    - HTML
    - RSS
    - JSON # Fuse.js 搜索需要

# 菜单配置
menu:
  main:
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 10
    - identifier: search
      name: 搜索
      url: /search/
      weight: 20
    - identifier: github
      name: GitHub
      url: "https://github.com/aweyonhub/hacknews"
      weight: 30

# 主题参数
params:
  # 主题模式 auto/light/dark
  defaultTheme: auto
  disableThemeToggle: false

  # 站点信息
  description: "每日精选Hacker News热点，中文解读与深度分析"
  keywords: [Hacker News, 科技新闻, 中文翻译, 技术洞察]
  author: "HackNews Digest"

  # 搜索配置
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

  # 主页信息模式
  homeInfoParams:
    Title: "📰 Hacker News 中文精选"
    Content: |
      每日精选 Top 10 Hacker News 热点话题，中文翻译 + 深度解读
      - ✅ 中英双语标题
      - 🎯 精选解读
      - 🔍 全文搜索
      - 📊 周度趋势分析

  # 社交链接
  socialIcons:
    - name: github
      url: "https://github.com/aweyonhub/hacknews"
    - name: rss
      url: "/index.xml"

  # 文章配置
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowReadingTime: true
  ShowWordCount: true
  ShowToc: true
  TocOpen: false

  # 代码高亮
  assets:
    disableHLJS: true
  markup:
    highlight:
      codeFences: true
      guessSyntax: true
      lineNos: true
      lineNumbersInTable: true
      noClasses: false
      style: "github-dark"
      tabWidth: 4

# 永久链接
permalinks:
  posts: "/:year/:month/:day/:title/"
